name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup uv (Python package manager)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configure pnpm node linker
        run: pnpm config set node-linker hoisted

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Python backend with PyInstaller
        run: pnpm run build:backend

      - name: Verify PyInstaller output
        run: |
          echo "Checking PyInstaller output..."
          if (Test-Path "backend/dist/main/main.exe") {
            Write-Host "SUCCESS: backend/dist/main/main.exe exists"
            Get-Item "backend/dist/main/main.exe" | Select-Object Name, Length
          } else {
            Write-Host "ERROR: backend/dist/main/main.exe NOT FOUND"
            if (Test-Path "backend/dist") {
              Write-Host "Contents of backend/dist:"
              Get-ChildItem "backend/dist" -Recurse
            } else {
              Write-Host "backend/dist folder does not exist"
            }
            exit 1
          }

      - name: Build and publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run compile && electron-builder --win --publish always
